<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");
const bgMusic = document.getElementById("bgMusic");
const container = document.querySelector('.container');

/* PLAY MUSIC AFTER FIRST INTERACTION */
document.body.addEventListener("click", () => { bgMusic.play().catch(()=>{}); }, { once: true });

/* MOVE NO BUTTON ON HOVER */
function moveButton() {
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}
noBtn.addEventListener("mouseover", moveButton);

/* YES CLICK */
yesBtn.addEventListener("click", function() {
    // Show the baddie perks
    message.innerHTML = `
        😍😍😍😍 You have unlocked: <strong>"Baddie Perks 😎"</strong> <br><br>
        ✔ Manbeating on demand <br>
        ✔ Attentive listening to yaps <br>
        ✔ Random meme sharing <br>
        ✔ Mild roasting, professional level <br>
        ✔ Premium chaos management 🎆💕
    `;
    container.style.paddingTop = "40px"; // Adjust padding
    startConfetti();
    startHearts();
});

/* FLOATING HEARTS AFTER YES */
function startHearts() {
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * container.offsetWidth + "px";
        heart.style.bottom = "0px";
        heart.style.fontSize = (Math.random() * 20 + 15) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        container.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 400);
}

/* CONFETTI */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let confettiPieces = [];

function startConfetti() {
    confettiPieces = [];
    for (let i = 0; i < 300; i++) {
        confettiPieces.push({
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: Math.random() * 8 + 4,
            speedX: (Math.random() - 0.5) * 20,
            speedY: (Math.random() - 0.5) * 20,
            color: `hsl(${Math.random()*360},100%,50%)`,
            life: 120
        });
    }
    animateConfetti();
}

function animateConfetti() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confettiPieces.forEach((p,index)=>{
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x,p.y,p.size,p.size);
        p.x += p.speedX;
        p.y += p.speedY;
        p.speedY += 0.4;
        p.life--;
        if(p.life<=0) confettiPieces.splice(index,1);
    });
    if(confettiPieces.length>0) requestAnimationFrame(animateConfetti);
}
</script>
